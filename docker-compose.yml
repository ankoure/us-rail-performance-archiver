services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    restart: unless-stopped
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_HOSTNAME=rail-archiver
    expose:
      - "8125/udp"

  app:
    build: .
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ./config:/app/config:ro
      - ./archive:/app/archive
    env_file:
      - .env
    depends_on:
      - datadog-agent

  batch:
    build: .
    restart: unless-stopped
    user: "1000:1000"
    # The image HEALTHCHECK probes poll_state/.heartbeat (the poller's liveness file),
    # which this rollup+ship loop never writes, so it would be perpetually "unhealthy".
    # Disable the inherited check rather than report a misleading status.
    healthcheck:
      disable: true
    # Cap rollup+ship RAM so an overrun OOM-kills this container (restart recovers)
    # rather than starving the box. Mirror of compose.prod.yml; tune via `docker stats`.
    mem_limit: 2560m
    environment:
    - PYTHONUNBUFFERED=1
    # 2 concurrent rollup processes — peak RAM scales with concurrent big feeds.
    # Mirror of compose.prod.yml.
    - ROLLUP_WORKERS=${ROLLUP_WORKERS:-2}
    volumes:
      - ./config:/app/config:ro
      - ./archive:/app/archive
      - ./curated:/app/curated
    env_file:
      - .env
    depends_on:
      - datadog-agent
    command: sh -c "while true; do DAY=$$(date -u -d yesterday +%F); python rollup.py --day $$DAY && python ship.py --day $$DAY; sleep 86400; done"
