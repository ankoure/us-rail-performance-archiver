services:
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    restart: unless-stopped
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_HOSTNAME=rail-archiver
    expose:
      - "8125/udp"

  # Poller, sharded across N=2 processes (the box has 2 vCPUs). Sharding is by
  # agency_id (archiver/shard.py), so each agency — including shared rate-limit
  # blocks like BAY_AREA_511 — lives entirely on one shard, keeping per-agency
  # TokenBucket budgets correct. Add shards by copying a block, bumping
  # --shard-index, and raising --shard-count on every shard in lockstep.
  #
  # The image's HEALTHCHECK marks a container unhealthy if its poll loop stops
  # refreshing poll_state/.heartbeat. `restart: unless-stopped` does not react to
  # health status, so the autoheal sidecar (below) watches for the `autoheal=true`
  # label and restarts unhealthy containers.
  #
  # Each shard gets its OWN host poll_state dir mounted at the same in-container
  # path, so the baked HEALTHCHECK (a fixed /app/poll_state/.heartbeat) keeps
  # working unchanged while each shard's heartbeat is independent — a dead shard
  # goes unhealthy on its own instead of being masked by a live sibling sharing
  # the file. poll_state is keyed by feed name and each feed lives on one shard,
  # so nothing is lost by not sharing it. ./archive stays shared: feed names are
  # globally unique, so there are no collisions and rollup consumes one tree.
  app-shard-0: &poller
    image: ghcr.io/ankoure/us-rail-performance-archiver:${IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "1000:1000"
    labels:
      - autoheal=true
    volumes:
      - ./config:/app/config:ro
      - ./archive:/app/archive
      - ./poll_state/shard-0:/app/poll_state
    command: python main.py --shard-index 0 --shard-count 2
    env_file:
      - .env
    depends_on:
      - datadog-agent

  app-shard-1:
    <<: *poller
    volumes:
      - ./config:/app/config:ro
      - ./archive:/app/archive
      - ./poll_state/shard-1:/app/poll_state
    command: python main.py --shard-index 1 --shard-count 2

  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  batch:
    image: ghcr.io/ankoure/us-rail-performance-archiver:${IMAGE_TAG:-latest}
    restart: unless-stopped
    user: "1000:1000"
    # The image HEALTHCHECK probes poll_state/.heartbeat (the poller's liveness file),
    # which this rollup+ship loop never writes, so it would be perpetually "unhealthy".
    # It carries no autoheal label, so nothing acts on it — disable the inherited check
    # rather than report a misleading status.
    healthcheck:
      disable: true
    environment:
    - PYTHONUNBUFFERED=1
    - ROLLUP_WORKERS=${ROLLUP_WORKERS:-4}
    volumes:
      - ./config:/app/config:ro
      - ./archive:/app/archive
      - ./curated:/app/curated
    env_file:
      - .env
    depends_on:
      - datadog-agent
    command: sh -c "while true; do DAY=$$(date -u -d yesterday +%F); python rollup.py --day $$DAY && python ship.py --day $$DAY; sleep 86400; done"
