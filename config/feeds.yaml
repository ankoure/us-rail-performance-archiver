  # MARTA exposes a REST/JSON arrivals API rather than GTFS-RT protobuf.
  # Requires a non-standard decoder (see MartaJsonDecoder) and JSON response handling.
  - agency_id: MARTA
    name: Metropolitan Atlanta Rapid Transit Authority
    region: Atlanta
    base_url: https://developerservices.itsmarta.com:18096/itsmarta
    auth:
      type: api_key
      param: apiKey
      env: MARTA_API_KEY
    feeds:
      - name: marta-traindata
        path: /railrealtimearrivals/developerservices/traindata
        expected_format: json
        decoder: marta_json
        poll_interval_seconds: 15

