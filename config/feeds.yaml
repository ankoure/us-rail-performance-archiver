writer:
  landing_dir: ./archive
  curated_dir: ./curated
s3:
  enabled: true
  region: us-east-1
  cold_bucket: rail-performance-archiver-cold
  hot_bucket: rail-performance-archiver-hot
  cold_prefix: "" # optional, prepended to S3 keys
  hot_prefix: "" # optional

telemetry:
  enabled: true
  service: rail-archiver
  env: dev
  agent_host: datadog-agent

agencies:
  - agency_id: BART
    name: Bay Area Rapid Transit
    region: San Francisco Bay Area
    base_url: https://api.bart.gov/gtfsrt
    auth:
      type: none
    feeds:
      - name: bart-trips
        path: /tripupdate.aspx
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: bart-alerts
        path: /alerts.aspx
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 60

  - agency_id: METRO_STL
    name: MetroLink (St. Louis)
    region: St. Louis
    base_url: https://www.metrostlouis.org/RealTimeData
    auth:
      type: none
    feeds:
      - name: metrostl-vehicles
        path: /StlRealTimeVehicles.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: metrostl-trips
        path: /StlRealTimeTrips.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: metrostl-alerts
        path: /StlRealTimeAlerts.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 60

  - agency_id: CATS
    name: Charlotte Area Transit System
    region: Charlotte
    base_url: https://gtfsrealtime.ridetransit.org/GTFSRealTime
    auth:
      type: none
    feeds:
      - name: cats-vehicles
        path: /Vehicle/VehiclePositions.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: cats-trips
        path: /TripUpdate/Tripupdates.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: cats-alerts
        path: /Alerts/Alerts.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 60

  - agency_id: GCRTA
    name: Greater Cleveland Regional Transit Authority
    region: Cleveland
    base_url: https://gtfs-rt.gcrta.vontascloud.com/TMGTFSRealTimeWebService
    auth:
      type: none
    feeds:
      - name: gcrta-vehicles
        path: /Vehicle/VehiclePositions.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: gcrta-trips
        path: /TripUpdate/TripUpdates.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: gcrta-alerts
        path: /Alert/Alerts.pb
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 60

