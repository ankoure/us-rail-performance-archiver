  # BRTA (Berkshire RTA) uses a RouteMatch JSON feed: the vehicle list is wrapped
  # in a {"data": [...]} envelope. The route list is baked into the byRoutes path.
  # Raw JSON is landed at collection; normalization is deferred to the gold layer.
  - agency_id: BRTA
    name: Berkshire Regional Transit Authority
    region: Berkshire
    timezone: America/New_York
    base_url: https://brta.routematch.io
    auth:
      type: none
    feeds:
      - name: brta-vehicles
        path: /feed/vehicle/byRoutes/Wk%20Rt%2001%2CWk%20Rt%2002%2CWk%20Rt%2003%2CWk%20Rt%2004%2CRoute%205%20Loop%2CWk%20Rt%2011%2CWk%20Rt%2012%2CWk%20Rt%2014%2CWk%20Rt%2015%2CWk%20Rt%2021%2CRte%2034%2CRte%2021%20Express?templates%5B%5D=title&templates%5B%5D=body&title=%7B%40internalVehicleId%7D&body=Heading+%7B%40tripDirection%7D+on+%7B%40masterRouteLongName%7D&timeHorizon=30&timeSensitive=true
        expected_format: json
        decoder: routematch_json
        poll_interval_seconds: 15

  # MeVa (Merrimack Valley Transit) uses a Trillium JSON feed: vehicles wrapped in
  # a {"status", "data": [...]} envelope (some Trillium endpoints return a bare array).
  # Raw JSON is landed at collection; normalization is deferred to the gold layer.
  - agency_id: MEVA
    name: Merrimack Valley Transit (MeVa)
    region: Merrimack Valley
    timezone: America/New_York
    base_url: https://maps.trilliumtransit.com
    auth:
      type: none
    feeds:
      - name: meva-vehicles
        path: /gtfsmap-realtime/feed/merrimackvalley-ma-us/vehicles
        expected_format: json
        decoder: trillium_json
        poll_interval_seconds: 15

  # GATRA, LRTA, WRTA use the Swiv (cadavl) JSON feed: vehicles wrapped in a
  # {"vehicule": [...]} envelope, with nested localisation/conduite objects. The
  # route-name (topo) lookup is normalization, deferred to the gold layer, so this
