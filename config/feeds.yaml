  # Re-enabled 2026-06-05: the 6 Bay Area operators are all the one 511.org API
  # behind a single key with a shared 60 req/hr limit, so they're modeled as ONE
  # agency → one client → one shared TokenBucket that enforces the 60/hr across all
  # 18 feeds. (Six separate agencies couldn't share a budget — the limiter is
  # per-client.) Budget split ≈55/hr (headroom under 60): vehicles/trips every
  # ~17 min, alerts every 30 min (alerts change rarely). burst kept small to avoid a
  # catch-up spike against the shared key. For higher resolution, request a limit
  # increase from 511sfbaydeveloperresources@googlegroups.com and raise `requests`.
  - agency_id: BAY_AREA_511
    name: Bay Area 511 (SFMTA, VTA, Caltrain, ACE, Capitol Corridor, SMART)
    region: San Francisco Bay Area
    timezone: America/Los_Angeles
    base_url: https://api.511.org/transit
    auth:
      type: api_key
      param: api_key
      env: BAY_AREA_511_API_KEY
    rate_limit:
      requests: 60
      per_seconds: 3600
      burst: 10
    feeds:
      - name: sfmta-vehicles
        path: /vehiclepositions?agency=SF
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 1000
      - name: sfmta-trips
        path: /tripupdates?agency=SF
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 1000
      - name: sfmta-alerts
        path: /servicealerts?agency=SF
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 1800
      - name: vta-vehicles
        path: /vehiclepositions?agency=SC
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 1000
      - name: vta-trips
        path: /tripupdates?agency=SC
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 1000
      - name: vta-alerts
        path: /servicealerts?agency=SC
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 1800
      - name: caltrain-vehicles
        path: /vehiclepositions?agency=CT
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 1000
      - name: caltrain-trips
        path: /tripupdates?agency=CT
