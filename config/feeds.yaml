    feeds:
      # MTA's endpoint requires the literal %2F in the URL — do not "clean" to '/', requests will 404.
      - name: sir
        path: "nyct%2Fgtfs-si"
        expected_format: protobuf
        decoder: standard
        poll_interval_seconds: 15
      - name: nyct-1234567s
        path: "nyct%2Fgtfs"
        expected_format: protobuf
        decoder: mta_nyct
        poll_interval_seconds: 15
      - name: nyct-nqrw
