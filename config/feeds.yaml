      type: api_key
      param: apiKey
      env: MARTA_API_KEY
    feeds:
      - name: marta-traindata
        path: /railrealtimearrivals/developerservices/traindata
        expected_format: json
        decoder: marta_json
        poll_interval_seconds: 15

  # MyLIRR exposes a non-standard JSON locations API (not GTFS-RT protobuf).
  # Requires two static request headers (default_headers) and JSON response handling.
  # Raw JSON is landed at collection; normalization is deferred to the rollup/gold layer.
  - agency_id: LIRR
    name: MTA Long Island Rail Road
    region: New York City
    timezone: America/New_York
    base_url: https://backend-unified.mylirr.org
    auth:
      type: none
    default_headers:
      accept-version: "3.0"
      origin: "https://radar.mta.info"
    feeds:
      - name: lirr-locations
        path: /locations?geometry=TRACK_TURF&railroad=LIRR
        expected_format: json
        decoder: mta_lirr_json
        poll_interval_seconds: 15

  # MWRTA (MetroWest RTA) exposes a non-standard JSON vehicle API. The CCRTA feed
  # below uses the same wire format (shared decoder), with minor key differences.
  # Raw JSON is landed at collection; normalization is deferred to the gold layer.
  - agency_id: MWRTA
    name: MetroWest Regional Transit Authority
    region: MetroWest Boston
    timezone: America/New_York
    base_url: https://vc.mwrta.com
    auth:
      type: none
