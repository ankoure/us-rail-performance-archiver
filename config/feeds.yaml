writer:
  writer_type: batch
  landing_dir: ./archive
  curated_dir: ./curated
  poll_state_dir: ./poll_state
  window_seconds: 300 # 5 minute windows for batching writes; ignored by LocalWriter
  landing_mode: s3
  landing_bucket: rail-performance-archiver-landing
  landing_prefix: "landing/"
  # rollup_source stays "local" on the box; the Fargate task overrides it to s3.
s3:
  enabled: true
  region: us-east-1
  cold_bucket: rail-performance-archiver-cold
  hot_bucket: rail-performance-archiver-hot
  cold_prefix: "" # optional, prepended to S3 keys
  hot_prefix: "" # optional

telemetry:
  enabled: true
  service: rail-archiver
  env: prod
  agent_host: datadog-agent

agencies:
