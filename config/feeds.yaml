  # FRTA and MART use Passio GO!, a POST JSON API: the system id is sent in the
  # request body ({"s0": <system_id>, "sA": 1}) to mapGetData.php?getBuses=2. The
  # response nests vehicles under "buses" as {vehicleId: [obj]}. The routes endpoint
  # (myid->name lookup) is normalization, deferred to gold, so we only POST getBuses.
  # Raw JSON is landed at collection; FRTA and MART share one decoder.
  # (BAT also uses Passio but its system id is credential-gated and unavailable here.)
  - agency_id: FRTA
