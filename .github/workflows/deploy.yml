name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  build:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SSM RunCommand to pull and restart
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Script that will run on the EC2 instance via SSM.
          SCRIPT=$(cat <<EOF
          set -euo pipefail
          cd /opt/rail-archiver
          git fetch --quiet origin main
          git reset --hard origin/main
          export IMAGE_TAG="$IMAGE_TAG"
          docker compose -f compose.prod.yml pull
          docker compose -f compose.prod.yml up -d
          docker image prune -f
          EOF
          )

          B64=$(printf '%s' "$SCRIPT" | base64 -w 0)

          # JSON form avoids shorthand-parser ambiguity with '=' padding and pipes.
          PARAMS=$(jq -n --arg c "echo $B64 | base64 -d | bash" '{commands:[$c]}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${SHA:0:7}" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' --output text)

          echo "SSM command: $CMD_ID"

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)

          echo "::group::stdout"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          echo "::endgroup::"
          echo "::group::stderr"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text
          echo "::endgroup::"

          [[ "$STATUS" == "Success" ]] || { echo "Deploy failed: $STATUS"; exit 1; }
