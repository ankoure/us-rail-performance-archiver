name: Feature request
description: Suggest a new capability or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do? What gap or pain point does this address?
      placeholder: I want to query how many vehicles each feed reported per hour, but the metadata parquet doesn't expose that yet.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you'd like. Sketch config or code if it helps.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Fetcher / HTTP client
        - Decoder (protobuf)
        - Landing zone writer (jsonl + raw bins)
        - Parquet rollup
        - Config / feeds.yaml
        - Scheduler / orchestration
        - CI / tooling
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, or examples from other projects.
    validations:
      required: false
